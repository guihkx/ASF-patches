id: net.justarchi.ArchiSteamFarm
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet10
  - org.freedesktop.Sdk.Extension.node24
command: ArchiSteamFarm

finish-args:
  - --share=network

modules:
  - name: ArchiSteamFarm
    buildsystem: simple
    build-options:
      env:
        DOTNET_CLI_TELEMETRY_OPTOUT: "true"
        DOTNET_NOLOGO: "true"
        XDG_CACHE_HOME: /run/build/ArchiSteamFarm/flatpak-node/cache
        npm_config_cache: /run/build/ArchiSteamFarm/flatpak-node/npm-cache
      append-path: /usr/lib/sdk/node24/bin:/usr/lib/sdk/dotnet10/bin
      append-ld-library-path: /usr/lib/sdk/dotnet10/lib
      append-pkg-config-path: /usr/lib/sdk/dotnet10/lib/pkgconfig
    build-commands:
      - npm install --prefix ASF-ui --offline
      - npm run-script deploy --no-progress --prefix ASF-ui
      - dotnet publish ArchiSteamFarm -c Release -o out/generic -p:ASFVariant=generic -p:ContinuousIntegrationBuild=true -p:RuntimeIdentifiers=linux-$([[ $FLATPAK_ARCH = "aarch64" ]] && echo "arm64" || echo "x64") -p:TargetLatestRuntimePatch=false -p:UseAppHost=false --source ./nuget-sources --source /usr/lib/sdk/dotnet10/nuget/packages -p:SelfContained=false -p:RuntimeIdentifier=
      - dotnet publish ArchiSteamFarm.OfficialPlugins.ItemsMatcher -c Release -o out/generic/plugins/ArchiSteamFarm.OfficialPlugins.ItemsMatcher -p:ASFVariant=generic -p:ContinuousIntegrationBuild=true -p:RuntimeIdentifiers=linux-$([[ $FLATPAK_ARCH = "aarch64" ]] && echo "arm64" || echo "x64") -p:TargetLatestRuntimePatch=false -p:UseAppHost=false --source ./nuget-sources --source /usr/lib/sdk/dotnet10/nuget/packages
      - dotnet publish ArchiSteamFarm.OfficialPlugins.MobileAuthenticator -c Release -o out/generic/plugins/ArchiSteamFarm.OfficialPlugins.MobileAuthenticator -p:ASFVariant=generic -p:ContinuousIntegrationBuild=true -p:TargetLatestRuntimePatch=false -p:RuntimeIdentifiers=linux-$([[ $FLATPAK_ARCH = "aarch64" ]] && echo "arm64" || echo "x64") -p:UseAppHost=false --source ./nuget-sources --source /usr/lib/sdk/dotnet10/nuget/packages
      - mkdir -p /app/lib/ArchiSteamFarm
      - cp -r out/generic/* /app/lib/ArchiSteamFarm
      - install.sh
      - install -Dm644 ArchiSteamFarm/overlay/variant-specific/generic/ArchiSteamFarm.desktop /app/share/applications/$FLATPAK_ID.desktop
      - install -Dm644 resources/ASF_512x512.png /app/share/icons/hicolor/512x512/apps/$FLATPAK_ID.png
      - install -Dm755 ArchiSteamFarm.sh /app/bin/ArchiSteamFarm
      - install -Dm644 $FLATPAK_ID.metainfo.xml -t /app/share/metainfo
    post-install:
      - desktop-file-edit --set-icon=$FLATPAK_ID /app/share/applications/$FLATPAK_ID.desktop
      - desktop-file-edit --remove-category=Game --add-category=Network /app/share/applications/$FLATPAK_ID.desktop
      - desktop-file-edit --set-key=Exec --set-value=ArchiSteamFarm /app/share/applications/$FLATPAK_ID.desktop
    sources:
      - type: dir
        path: ./ArchiSteamFarm
      - type: patch
        paths:
          - patches/0001-Disallow-the-detection-of-custom-builds.patch
          - patches/0001-Disallow-the-detection-of-custom-plugins.patch
          - patches/0001-Read-physical-memory-usage.patch
          - patches/0001-Remove-25-minute-login-cooldown.patch
          - patches/0001-Remove-stupid-startup-delay.patch
      - type: script
        dest-filename: ArchiSteamFarm.sh
        commands:
          - test ! -d "$XDG_CONFIG_HOME"/ArchiSteamFarm && mkdir -p "$XDG_CONFIG_HOME"/ArchiSteamFarm
          - exec dotnet /app/lib/ArchiSteamFarm/ArchiSteamFarm.dll --path "$XDG_CONFIG_HOME"/ArchiSteamFarm "$@"
      - type: file
        path: net.justarchi.ArchiSteamFarm.metainfo.xml
      - node-sources-ASF-ui.json
      - nuget-sources-ASF.json
